name: Run Data Sync

on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * *'

env:
  GITHUB_NAME: ZhengHe-MD
  GITHUB_EMAIL: ranchardzheng@gmail.com
  MIN_DISTANCE_KM: "3"
  MAX_PACE_MIN_PER_KM: "8"

jobs:
  sync:
    name: Sync
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Download latest tracks
        run: |
          wget -P public/ https://zhenghe-md.github.io/running_page/activities.json
      - name: Install jq
        run: |
          sudo apt-get update && sudo apt-get install -y jq
      - name: Transform the activities.json data
        run: |
          jq --arg min_distance_km "${{ env.MIN_DISTANCE_KM }}" --arg max_pace_min_per_km "${{ env.MAX_PACE_MIN_PER_KM }}" '
            map({
              date: (.start_date_local | sub(" .*"; "")),
              distance: (.distance / 1000),
              duration: {
                hours: (.moving_time | split(":") | map(tonumber) | .[0]),
                mins: (.moving_time | split(":") | map(tonumber) | .[1]),
                secs: (.moving_time | split(":") | map(tonumber) | .[2])
              }
            })
            | map(
                .durationSeconds =
                  (
                    ((.duration.hours // 0) * 3600) +
                    ((.duration.mins // 0) * 60) +
                    (.duration.secs // 0)
                  )
              )
            | map(
                .paceMinPerKm =
                  if .distance > 0 then
                    (.durationSeconds / 60 / .distance)
                  else
                    999
                  end
              )
            | map(
                select(.distance >= ($min_distance_km | tonumber))
                | select(.paceMinPerKm <= ($max_pace_min_per_km | tonumber))
              )
            | sort_by(.date)
            | group_by(.date)
            | map(max_by(.distance) | del(.durationSeconds, .paceMinPerKm))
          ' public/activities.json > public/activities-normalized.json
          jq -s '
            add
            | sort_by(.date)
            | group_by(.date)
            | map(max_by(.distance))
          ' public/data.json public/activities-normalized.json > public/merged.json
          mv public/merged.json public/data.json
          rm public/activities-normalized.json
      - name: Push the merged data to the repo
        run: |
          git config --local user.email "${{ env.GITHUB_EMAIL }}"
          git config --local user.name "${{ env.GITHUB_NAME }}"
          git add public/data.json
          git commit -m "update new runs $(date +'%Y-%m-%d')" || echo "nothing to commit"
          git push || echo "nothing to push"
